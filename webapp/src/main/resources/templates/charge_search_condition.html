<!DOCTYPE html>
<html th:replace="~{layout/app :: layout('料金情報検索', ~{::content}, 'member')}" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="content">
  <div th:if="!${#strings.isEmpty(message)}" class="alert alert-success">
    <span th:text="${message}"></span>
  </div>
  <!--/* 料金情報検索画面 */-->
  <form th:action="@{/charge/search}" th:object="${chargeSearchCondition}" method="POST">
    <!--/* 料金名 */-->
    <div class="charge-search" style="display:flex; align-items:center; gap:20px;">
      <span style="white-space: nowrap;">料金名</span>
      <input type="text" th:field="*{charge}" />
    </div>

    <!--/* ここにテキストフォームを設置 */-->
    <div class="button-group">
      <button type="submit">検索</button>
      <a role="button" class="outline" th:href="@{/charge/add}">登録</a>
    </div>
  </form>
</div>

</html>
